<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>FULL BODY</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --lime:#d5ff40;
    --bg:#070b12;
    --card:#121826;
    --card2:#151d2d;
    --text:#ffffff;
    --gray:#8f98aa;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:
    radial-gradient(circle at top left, rgba(213,255,64,0.15), transparent 30%),
    radial-gradient(circle at bottom right, rgba(213,255,64,0.08), transparent 30%),
    var(--bg);

    color:white;
    min-height:100vh;
    overflow-x:hidden;
}

.glow{
    position:fixed;
    width:400px;
    height:400px;
    background:var(--lime);
    filter:blur(160px);
    opacity:0.12;
    border-radius:50%;
    top:-100px;
    right:-100px;
    z-index:0;
}

.container{
    position:relative;
    z-index:2;
    padding:28px;
}

.logo{
    width:130px;
    height:130px;
    border-radius:42px;
    background:linear-gradient(
    135deg,
    rgba(213,255,64,0.95),
    rgba(170,220,30,0.55)
    );

    margin-bottom:34px;

    box-shadow:
    0 20px 60px rgba(213,255,64,0.2);

    position:relative;
    overflow:hidden;
}

.logo::before{
    content:'';
    position:absolute;
    width:240px;
    height:70px;
    background:rgba(255,255,255,0.07);
    transform:rotate(-45deg);
    top:20px;
    left:-50px;
}

.logo::after{
    content:'✓';
    position:absolute;
    color:#0b0f17;
    font-size:44px;
    font-weight:800;
    top:35px;
    left:48px;
}

.title{
    font-size:56px;
    line-height:1;
    font-weight:800;
    margin-bottom:12px;
}

.subtitle{
    color:var(--gray);
    margin-bottom:40px;
    font-size:18px;
}

.weeks{
    display:flex;
    gap:14px;
    overflow:auto;
    padding-bottom:8px;
    margin-bottom:34px;
}

.weeks::-webkit-scrollbar{
    display:none;
}

.week{
    min-width:max-content;
    padding:14px 22px;
    border-radius:22px;
    background:#182234;
    color:white;
    border:none;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:0.25s;
}

.week.active{
    background:var(--lime);
    color:black;
    box-shadow:0 0 30px rgba(213,255,64,0.35);
}

.training-card{
    background:
    linear-gradient(
    145deg,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.01)
    );

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.05);

    border-radius:34px;
    padding:28px;

    margin-bottom:22px;

    cursor:pointer;

    transition:0.25s;

    position:relative;
    overflow:hidden;
}

.training-card:hover{
    transform:translateY(-3px);
}

.training-card::before{
    content:'';
    position:absolute;
    width:220px;
    height:220px;
    background:rgba(213,255,64,0.07);
    border-radius:50%;
    top:-100px;
    right:-100px;
}

.training-card h2{
    font-size:36px;
    margin-bottom:10px;
}

.training-card p{
    color:var(--gray);
    font-size:16px;
}

.screen{
    display:none;
}

.screen.active{
    display:block;
}

.back{
    width:56px;
    height:56px;
    border-radius:20px;
    border:none;
    background:#182234;
    color:white;
    font-size:26px;
    margin-bottom:30px;
    cursor:pointer;
}

.training-title{
    font-size:44px;
    font-weight:800;
    margin-bottom:28px;
}

.exercise{
    background:
    linear-gradient(
    145deg,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.015)
    );

    border:1px solid rgba(255,255,255,0.05);

    border-radius:30px;

    padding:24px;

    margin-bottom:18px;
}

.exercise-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
}

.exercise-name{
    font-size:24px;
    font-weight:700;
    max-width:70%;
}

.exercise-sets{
    background:rgba(213,255,64,0.12);
    color:var(--lime);
    padding:10px 14px;
    border-radius:16px;
    font-size:15px;
    font-weight:700;
}

.inputs{
    display:flex;
    gap:14px;
}

.input-box{
    flex:1;
}

.input-label{
    color:var(--gray);
    font-size:13px;
    margin-bottom:8px;
}

.input{
    width:100%;
    background:#0d1420;
    border:none;
    border-radius:20px;
    padding:18px;
    color:white;
    font-size:18px;
    outline:none;
}

.input:focus{
    border:1px solid var(--lime);
    box-shadow:0 0 20px rgba(213,255,64,0.15);
}

.saved{
    margin-top:14px;
    color:#7f8aa1;
    font-size:13px;
}

.big-number{
    position:absolute;
    right:24px;
    bottom:-10px;
    font-size:110px;
    font-weight:800;
    color:rgba(255,255,255,0.03);
}

@media(max-width:600px){

.title{
    font-size:42px;
}

.training-card h2{
    font-size:30px;
}

.exercise-name{
    font-size:20px;
}

.inputs{
    flex-direction:row;
}

}

</style>
</head>

<body>

<div class="glow"></div>

<div class="container">

<!-- HOME -->

<div id="home" class="screen active">

<div class="logo"></div>

<div class="title">
FULL BODY
</div>

<div class="subtitle">
Workout tracking system
</div>

<div class="weeks">

<button class="week active" onclick="setWeek(this,'Легкая')">
Легкая
</button>

<button class="week" onclick="setWeek(this,'Средняя 1')">
Средняя 1
</button>

<button class="week" onclick="setWeek(this,'Средняя 2')">
Средняя 2
</button>

<button class="week" onclick="setWeek(this,'Тяжелая')">
Тяжелая
</button>

</div>

<div class="training-card" onclick="openTraining(0)">
<div class="big-number">1</div>
<h2>Тренировка 1</h2>
<p>Грудь • Спина • Ноги • Плечи</p>
</div>

<div class="training-card" onclick="openTraining(1)">
<div class="big-number">2</div>
<h2>Тренировка 2</h2>
<p>Становая • Верх • Ноги • Руки</p>
</div>

<div class="training-card" onclick="openTraining(2)">
<div class="big-number">3</div>
<h2>Тренировка 3</h2>
<p>Изоляция • Плечи • Руки • Пресс</p>
</div>

</div>

<!-- TRAINING SCREEN -->

<div id="trainingScreen" class="screen"></div>

</div>

<script>

let currentWeek = "Легкая";

const trainings = [

{
title:"Тренировка 1",
exercises:[
["Жим лежа",4],
["Тяга нижнего блока",4],
["Жим ногами",4],
["Жим гантелей на плечи",4],
["Бицепс с косичкой",3],
["Сгибание на трицепс",4],
["Пресс",3]
]
},

{
title:"Тренировка 2",
exercises:[
["Становая тяга",4],
["Жим на наклонной",4],
["Верхний блок",4],
["Выпады",3],
["Сгибание ног",3],
["Разводки на плечи",3],
["Сгибание с гантелями",3],
["Трицепс с гантелей",3],
["Икры",3]
]
},

{
title:"Тренировка 3",
exercises:[
["Бабочка",3],
["Тяга нижнего блока",4],
["Разгибание ног",3],
["Жим гантелей на плечи",3],
["Поднятие перед собой",3],
["Бицепс в тренажере",4],
["Сгибание на трицепс",3],
["Пресс",3]
]
}

];

function setWeek(btn,week){

currentWeek = week;

document.querySelectorAll('.week')
.forEach(el=>el.classList.remove('active'));

btn.classList.add('active');

}

function openTraining(index){

const training = trainings[index];

document.getElementById('home')
.classList.remove('active');

const screen =
document.getElementById('trainingScreen');

screen.classList.add('active');

let html = `
<button class="back" onclick="goBack()">←</button>

<div class="training-title">
${training.title}
</div>
`;

training.exercises.forEach(ex=>{

const name = ex[0];
const sets = ex[1];

const weightKey =
`${currentWeek}_${training.title}_${name}_weight`;

const repsKey =
`${currentWeek}_${training.title}_${name}_reps`;

const weight =
localStorage.getItem(weightKey) || '';

const reps =
localStorage.getItem(repsKey) || '';

html += `

<div class="exercise">

<div class="exercise-top">

<div class="exercise-name">
${name}
</div>

<div class="exercise-sets">
${sets} подхода
</div>

</div>

<div class="inputs">

<div class="input-box">

<div class="input-label">
Вес
</div>

<input
class="input"
type="number"
placeholder="80"
value="${weight}"
oninput="save('${weightKey}',this.value)"
>

</div>

<div class="input-box">

<div class="input-label">
Повторения
</div>

<input
class="input"
type="number"
placeholder="10"
value="${reps}"
oninput="save('${repsKey}',this.value)"
>

</div>

</div>

<div class="saved">
Автосохранение
</div>

</div>

`;

});

screen.innerHTML = html;

}

function goBack(){

document.getElementById('trainingScreen')
.classList.remove('active');

document.getElementById('home')
.classList.add('active');

}

function save(key,value){
localStorage.setItem(key,value);
}

</script>

</body>
</html>
